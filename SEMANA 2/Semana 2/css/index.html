<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Google</title>

    <!-- Enlace al archivo CSS -->
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>

    <!-- Encabezado con enlaces de navegación -->
    <header>
        <nav>
            <a href="#">Gmail</a>
            <a href="#">Imágenes</a>
        </nav>
        <img src="../perfil.png" alt="Perfil" class="perfil">
    </header>

    <!-- Contenido principal -->
    <main>

        <!-- Logo de Google -->
        <section class="logo">
            <h1>Google</h1>
        </section>

        <!-- Barra de búsqueda -->
        <section class="busqueda">
            <form>
                <input type="text" placeholder="Buscar en Google">
                <div class="botones">
                    <button type="submit">Buscar</button>
                    <button type="button">Voy a tener suerte</button>
                </div>
            </form>
        </section>

    </main>

        <!-- Pie de página -->
    <footer>
        <p>Publicidad | Negocios | Cómo funciona la Búsqueda</p>
    </footer>

</body>
</html>
